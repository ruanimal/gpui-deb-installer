<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- App background -->
  <rect width="48" height="48" rx="10" fill="#1E40AF"/>

  <!-- Isometric box: top face (lightest) -->
  <polygon points="24,10 38,17 24,24 10,17" fill="#EFF6FF"/>

  <!-- Left face (medium) -->
  <polygon points="10,17 24,24 24,38 10,31" fill="#BFDBFE"/>

  <!-- Right face (slightly darker) -->
  <polygon points="38,17 24,24 24,38 38,31" fill="#93C5FD"/>

  <!-- Subtle edge lines -->
  <polyline points="10,17 24,10 38,17 38,31 24,38 10,31 10,17"
            fill="none" stroke="#1E40AF" stroke-width="0.6" opacity="0.4"/>
  <line x1="24" y1="10" x2="24" y2="24" stroke="#1E40AF" stroke-width="0.6" opacity="0.4"/>
  <line x1="24" y1="24" x2="24" y2="38" stroke="#1E40AF" stroke-width="0.6" opacity="0.4"/>
  <line x1="10" y1="17" x2="38" y2="17" stroke="#1E40AF" stroke-width="0.6" opacity="0.4"/>
</svg>
