name: Build DEB Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # 在 Ubuntu 20.04 容器内构建，确保 glibc 版本 <= 2.31
    # 编译产物可在 Ubuntu 20.04+ / Debian 11+ 上运行
    container:
      image: ubuntu:20.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            deb_arch: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y \
            build-essential pkg-config curl git ca-certificates \
            libvulkan-dev libssl-dev \
            libwayland-dev libwayland-egl-backend-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxcb1-dev libxcb-xkb-dev \
            libfontconfig1-dev libfreetype6-dev \
            libdbus-1-dev \
            clang

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.arch }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.arch }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.arch }}-target-

      - name: Build release binary
        run: |
          . "$HOME/.cargo/env"
          cargo build --release

      - name: Install cargo-deb
        run: |
          . "$HOME/.cargo/env"
          cargo install cargo-deb

      - name: Build DEB package
        run: |
          . "$HOME/.cargo/env"
          cargo deb --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: target/debian/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # 仅在推送 tag 时创建 Release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
          draft: false
